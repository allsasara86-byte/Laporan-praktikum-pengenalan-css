<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Validasi Form</title>

    <style>
        .error {
            color: red;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <h2>Form Registrasi</h2>

    <form onsubmit="return validasi()">

        <label for="nama">Nama Lengkap:</label>
        <br>

        <input
            type="text"
            id="nama"
            name="nama">
        <br>

        <small
            id="nama-error"
            class="error">
        </small>

        <br><br>

        <input
            type="submit"
            value="Daftar">

    </form>

    <script>

        function validasi() {

            var inputNama = document.getElementById("nama").value;
            var errorElement = document.getElementById("nama-error");

            if (inputNama == "") {

                errorElement.innerHTML = "Nama tidak boleh kosong!";
                return false;

            }

            alert("Registrasi berhasil!");
            return true;

        }

    </script>

</body>

</html>
