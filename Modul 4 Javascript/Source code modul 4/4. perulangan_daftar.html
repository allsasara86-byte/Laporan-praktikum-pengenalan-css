<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Perulangan</title>
</head>

<body>

    <h2>Daftar Mata Kuliah</h2>

    <ul id="daftar-matkul">
        <!-- Konten akan diisi oleh JavaScript -->
    </ul>

    <script>

        var matkul = [
            "Pemrograman Web",
            "Struktur Data",
            "Basis Data",
            "Jaringan Komputer"
        ];

        var daftarElement = document.getElementById("daftar-matkul");

        for (let i = 0; i < matkul.length; i++) {
            daftarElement.innerHTML += "<li>" + matkul[i] + "</li>";
        }

    </script>

</body>

</html>
