<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Sederhana</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 68%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .btn-tambah {
            padding: 8px 15px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-tambah:hover {
            background-color: #0b5ed7;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        .btn-hapus {
            padding: 5px 10px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-hapus:hover {
            background-color: #bb2d3b;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>To-Do List Sederhana</h2>

        <input type="text" id="input-todo" placeholder="Masukkan tugas">

        <button class="btn-tambah" onclick="tambahTugas()">
            Tambah
        </button>

        <ul id="daftar-tugas"></ul>

    </div>

    <script>

        var tugas = [];

        function tambahTugas() {

            var inputElement = document.getElementById("input-todo");

            if (inputElement.value.trim() == "") {
                alert("Tugas tidak boleh kosong!");
                return;
            }

            tugas.push(inputElement.value);

            inputElement.value = "";

            tampilkanDaftar();

        }

        function tampilkanDaftar() {

            var daftarElement = document.getElementById("daftar-tugas");

            daftarElement.innerHTML = "";

            for (let i = 0; i < tugas.length; i++) {

                daftarElement.innerHTML +=
                    "<li>" +
                    tugas[i] +
                    "<button class='btn-hapus' onclick='hapusTugas(" + i + ")'>Hapus</button>" +
                    "</li>";

            }

        }

        function hapusTugas(index) {

            tugas.splice(index, 1);

            tampilkanDaftar();

        }

    </script>

</body>

</html>
