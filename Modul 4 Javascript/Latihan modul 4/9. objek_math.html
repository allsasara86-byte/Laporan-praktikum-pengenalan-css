<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Angka Acak</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef4f8;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border: 1px solid #d6dce5;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h2 {
            color: #3b5d7a;
        }

        button {
            padding: 8px 16px;
            background-color: #6c8ebf;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5b7ca8;
        }

        #angkaAcak {
            color: #2f5d8c;
            font-weight: bold;
            font-size: 24px;
        }

        p {
            color: #555;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Generator Angka Acak</h2>

        <p>Klik tombol di bawah untuk menghasilkan angka acak (1 - 100).</p>

        <button onclick="generateRandom()">
            Hasilkan Angka
        </button>

        <h3>
            Angka Acak :
            <span id="angkaAcak">-</span>
        </h3>

    </div>

    <script>

        function generateRandom() {

            var angka = Math.floor(Math.random() * 100) + 1;

            document.getElementById("angkaAcak").innerHTML = angka;

        }

    </script>

</body>

</html>
