<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Digital</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef4f8;
        }

        .container {
            width: 400px;
            margin: 60px auto;
            padding: 20px;
            background: white;
            border: 1px solid #d6dce5;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h2 {
            color: #3b5d7a;
            margin-bottom: 20px;
        }

        #tanggal {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
        }

        #jam {
            font-size: 36px;
            font-weight: bold;
            color: #2f5d8c;
        }
    </style>

</head>

<body onload="jalankanJam()">

    <div class="container">

        <h2>Jam Digital</h2>

        <div id="tanggal"></div>

        <div id="jam"></div>

    </div>

    <script>

        function updateJam() {

            var sekarang = new Date();

            var jam = sekarang.getHours();
            var menit = sekarang.getMinutes();
            var detik = sekarang.getSeconds();

            jam = (jam < 10 ? "0" : "") + jam;
            menit = (menit < 10 ? "0" : "") + menit;
            detik = (detik < 10 ? "0" : "") + detik;

            var waktu = jam + ":" + menit + ":" + detik;

            document.getElementById("jam").innerHTML = waktu;

            var tanggal = sekarang.toLocaleDateString('id-ID', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            document.getElementById("tanggal").innerHTML = tanggal;

        }

        function jalankanJam() {

            updateJam();

            setInterval(updateJam, 1000);

        }

    </script>

</body>

</html>
