<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow Film Kartun</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
            margin: 0;
            padding: 40px;
        }

        .container {
            width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        h2 {
            color: #333;
        }

        img {
            width: 500px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            border: 4px solid #3498db;
        }

        button {
            margin: 15px;
            padding: 10px 20px;
            border: none;
            background: #3498db;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #217dbb;
        }

        h3 {
            color: #e74c3c;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Galeri Film Kartun</h2>

    <img id="slideshow-image" src="" alt="Film Kartun">

    <h3 id="judul-film"></h3>

    <br>

    <button onclick="gantiGambar(-1)">⬅ Previous</button>
    <button onclick="gantiGambar(1)">Next ➡</button>

</div>

<script>

var gambar = [
"ruby.jpeg",
"frozen.jpeg",
"Pororo.jpeg"
];

var judul = [
"Rainbow ruby",
"Frozen",
"Pororo"
];

var indexGambar = 0;

function tampilkanGambar() {

    document.getElementById("slideshow-image").src = gambar[indexGambar];

    document.getElementById("judul-film").innerHTML = judul[indexGambar];

}

function gantiGambar(arah) {

    indexGambar += arah;

    if(indexGambar >= gambar.length){
        indexGambar = 0;
    }

    if(indexGambar < 0){
        indexGambar = gambar.length - 1;
    }

    tampilkanGambar();
}

tampilkanGambar();

</script>

</body>

</html>
