<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap Background Color</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2 class="text-center text-primary mb-4">
        Contoh Warna Background Bootstrap
    </h2>

    <div class="bg-primary p-3 mb-2 text-white">
        Background Primary (Biru)
    </div>

    <div class="bg-success p-3 mb-2 text-white">
        Background Success (Hijau)
    </div>

    <div class="bg-info p-3 mb-2 text-dark">
        Background Info (Biru Muda)
    </div>

    <div class="bg-warning p-3 mb-2 text-dark">
        Background Warning (Kuning)
    </div>

    <div class="bg-danger p-3 mb-2 text-white">
        Background Danger (Merah)
    </div>

    <div class="bg-secondary p-3 mb-2 text-white">
        Background Secondary (Abu-abu)
    </div>

    <div class="bg-dark p-3 mb-2 text-white">
        Background Dark (Hitam)
    </div>

    <div class="bg-light p-3 mb-3 text-dark border">
        Background Light (Putih)
    </div>

    <button class="btn btn-primary">
        Klik Saya
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
