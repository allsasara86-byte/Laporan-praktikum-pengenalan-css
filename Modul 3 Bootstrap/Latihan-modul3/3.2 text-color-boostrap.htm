<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap Font Color</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center text-primary">Contoh Warna Font Bootstrap</h2>

        <div class="alert alert-info mt-3">
            Bootstrap menyediakan berbagai class warna untuk mempercantik tampilan teks.
        </div>

        <p class="text-primary">Teks warna biru (Primary).</p>
        <p class="text-success">Teks warna hijau (Success).</p>
        <p class="text-warning">Teks warna kuning (Warning).</p>
        <p class="text-danger">Teks warna merah (Danger).</p>
        <p class="text-secondary">Teks warna abu-abu (Secondary).</p>

        <button class="btn btn-primary">Klik Saya</button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
