<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap Modal Profil</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container text-center mt-5">

    <h2 class="text-primary">Profil Mahasiswa</h2>
    <p>Klik tombol di bawah untuk melihat profil.</p>

    <button type="button" class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#myModal">
        Lihat Profil
    </button>

</div>

<!-- Modal -->
<div class="modal fade" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <!-- Header -->
            <div class="modal-header bg-primary text-white">
                <h4 class="modal-title">Data Mahasiswa</h4>
                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">
                </button>
            </div>

            <!-- Body -->
            <div class="modal-body">
                <p><strong>Nama :</strong> Allsasara</p>
                <p><strong>NIM :</strong> 202413007</p>
                <p><strong>Program Studi :</strong> Sistem Informasi</p>
                <p><strong>Kampus :</strong> STITEK Bontang</p>
            </div>

            <!-- Footer -->
            <div class="modal-footer">
                <button type="button"
                        class="btn btn-danger"
                        data-bs-dismiss="modal">
                    Tutup
                </button>
            </div>

        </div>
    </div>
</div>

</body>
</html>
