<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum CSS</title>

    <style>
        body {
            background: linear-gradient(to right, #87CEFA, #B0E0E6);
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: navy;
            margin-top: 50px;
            text-transform: uppercase;
        }

        p {
            color: #333;
            font-size: 18px;
        }

        .container {
            background-color: white;
            width: 60%;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .btn {
            background-color: navy;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hai allsasara</h1>
        <p>Selamat Datang di Praktikum CSS</p>
        <p>Praktikum ini bertujuan untuk mempelajari dasar-dasar CSS dalam pengembangan website.</p>

        <button class="btn">Mulai Belajar</button>
    </div>

</body>
</html>
