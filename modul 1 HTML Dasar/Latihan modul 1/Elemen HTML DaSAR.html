<!DOCTYPE html>
<html>
<head>
    <title>Elemen HTML Dasar</title>
</head>
<body>

    <!-- Heading -->
    <h2>Profil Mahasiswa</h2>

    <!-- Paragraf yang mengandung link -->
    <p>
        Saya adalah mahasiswa Sistem Informasi.
        Kunjungi website kampus saya di
        <a href="https://stitek.ac.id/">STITEK</a>.
    </p>

    <!-- Gambar dengan atribut alt -->
    <img src="mahasiswa.jpg" alt="Foto Mahasiswa" width="300">

    <!-- Daftar tidak berurutan -->
    <ul>
        <li>Mempelajari HTML</li>
        <li>Mempelajari CSS</li>
        <li>Mempelajari JavaScript</li>
    </ul>

</body>
</html>
